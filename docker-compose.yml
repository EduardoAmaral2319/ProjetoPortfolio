version: '3.8'
services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/usr/share/nginx/html
    networks:
      - app-network
  api:
    build: ./backend
    ports:
      - "5000:5000"
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
