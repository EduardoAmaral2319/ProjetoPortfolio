version: '3.8'
services:
  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - api
  api:
    build: ./backend
    ports:
      - "5000:5000"
    networks:
      - app-network
networks:
  app-network:
    driver: bridge