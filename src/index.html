<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Eduardo Amaral</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <div class="logo">Eduardo Amaral</div>
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="sobre" class="hero">
            <h1>Olá, eu sou Eduardo Amaral</h1>
            <p>Estudante de Ciência da Computação focando em infraestrutura, código limpo e arquitetura de sistemas.</p>
        </section>
        <section id="contato" class="contact-section">
            <h2>Vamos conversar?</h2>
            <p class="contact-subtitle">Preencha o formulário abaixo para entrar em contato.</p>
            <form action="/api/contato" method="POST" class="contact-form">
                <div class="input-group">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" required placeholder="Seu nome">
                </div>
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>
</body>
</html>
