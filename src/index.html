<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Eduardo Amaral</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav aria-label="Menu Principal">
            <ul>
                <li><a href="#sobre">Sobre</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="sobre">
            <h1>Olá, eu sou Eduardo Amaral</h1>
            <p>Estudante de Ciência da Computação focando em infraestrutura, código limpo e arquitetura de sistemas.</p>
        </section>
        <section id="contato">
            <form action="http://localhost:5000/contato" method="POST">
                <input type="text" name="nome" required placeholder="Carlos Eduardo Pimentel Amaral">
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
</body>
</html>
